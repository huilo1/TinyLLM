[run]
name = "smoke_chat"
seed = 42
artifacts_dir = "artifacts"

[data]
dataset_id = "ZeroAgency/ru-instruct-conversation-v1"
processed_dir = "data/processed/smoke_chat"
format = "chat"
validation_ratio = 0.02
test_ratio = 0.02
min_text_chars = 32
min_messages = 2
max_train_samples = 512
max_validation_samples = 128
max_test_samples = 128
text_separator = "\n\n"
deduplicate = true

[tokenizer]
vocab_size = 4096
min_frequency = 2

[model]
sequence_length = 128
n_layers = 2
n_heads = 4
d_model = 128
mlp_ratio = 4
dropout = 0.1

[training]
batch_size = 16
eval_batch_size = 16
learning_rate = 0.0004
weight_decay = 0.05
num_epochs = 1
grad_clip = 1.0
num_workers = 0
warmup_ratio = 0.05
min_lr_ratio = 0.3

[generation]
max_new_tokens = 96
temperature = 0.8
top_k = 40
sample_prompts = [
  "<|system|>\nТы полезный русскоязычный ассистент.\n\n<|user|>\nЧто такое overfitting?\n\n<|assistant|>",
]
