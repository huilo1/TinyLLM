name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: tinyllm-prod-deploy
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on:
      - self-hosted
      - tinyllm
    steps:
      - uses: actions/checkout@v4
      - name: Run repo deploy instructions
        run: bash deploy/deploy-prod.sh
